<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Withdraw - Queen Bee</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.header{
    background:#ffc107;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.balance{
    font-size:30px;
    font-weight:bold;
    text-align:center;
    color:#e0a800;
}

input{
    width:100%;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ddd;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#ffc107;
    font-size:16px;
    font-weight:bold;
}

.info{
    line-height:1.8;
}

</style>

</head>


<body>

<div class="header">
🐝 Queen Bee - Withdraw
</div>


<div class="container">


<div class="card">

<h3>Your Balance</h3>

<div class="balance">
$0.00
</div>

</div>



<div class="card">

<h3>PayPal Withdrawal</h3>

<input type="email" placeholder="PayPal Email">


<input type="number" placeholder="Amount ($)">


<button>
Request Withdrawal
</button>

</div>



<div class="card info">

<h3>Withdrawal Rules</h3>

<p>✅ Minimum withdrawal: $8</p>

<p>✅ Payment method: PayPal</p>

<p>✅ Processing time: 1-7 days</p>

</div>


</div>


</body>
</html>
