<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel - Queen Bee</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.header{
    background:#222;
    color:white;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.stat{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#fafafa;
    border-radius:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#ffc107;
    font-weight:bold;
}

</style>

</head>


<body>


<div class="header">
🐝 Queen Bee Admin
</div>


<div class="container">


<div class="card">

<h3>Website Statistics</h3>

<div class="stat">
<span>Total Users</span>
<b>0</b>
</div>

<div class="stat">
<span>Active Users</span>
<b>0</b>
</div>

<div class="stat">
<span>Total Paid</span>
<b>$0</b>
</div>

</div>



<div class="card">

<h3>Manage Users</h3>

<button>
View Users
</button>

<button>
Block User
</button>

</div>



<div class="card">

<h3>Advertisement Settings</h3>

<button>
Add Advertisement
</button>

<button>
Change Reward Amount
</button>

</div>



<div class="card">

<h3>Withdrawal Requests</h3>

<button>
Review Withdrawals
</button>

</div>



</div>


</body>

</html>
