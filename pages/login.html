<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Queen Bee</title>

<link rel="stylesheet" href="../style.css">

<style>

.login-box{
max-width:450px;
margin:80px auto;
background:#151515;
padding:35px;
border-radius:15px;
}

.login-box h1{
text-align:center;
color:#f7c600;
margin-bottom:30px;
}

.input-group{
margin-bottom:20px;
}

.input-group label{
display:block;
margin-bottom:8px;
}

.input-group input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#222;
color:white;
}

.login-btn{
width:100%;
padding:15px;
background:#f7c600;
color:#111;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.login-btn:hover{
opacity:.9;
}

.register{
margin-top:20px;
text-align:center;
}

.register a{
color:#f7c600;
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<h1>🐝 Queen Bee</h1>

<div class="input-group">
<label>Email</label>
<input type="email" placeholder="Enter your email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Enter your password">
</div>

<button class="login-btn" onclick="login()">
Login
</button>

<script>
function login(){
    window.location.href = "dashboard.html";
}
</script>

<div class="register">
Don't have an account?
<a href="register.html">Register</a>
</div>

</div>

</body>
</html>
