<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>History - Queen Bee</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.header{
    background:#ffc107;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.item{
    display:flex;
    justify-content:space-between;
    padding:15px 0;
    border-bottom:1px solid #eee;
}

.amount{
    font-weight:bold;
    color:green;
}

.withdraw{
    color:red;
}

.empty{
    text-align:center;
    color:#777;
    padding:30px;
}

</style>

</head>


<body>


<div class="header">
🐝 Queen Bee - History
</div>


<div class="container">


<div class="card">

<h3>Earnings History</h3>


<div class="item">

<span>Watching Ads</span>

<span class="amount">
+$0.01
</span>

</div>


<div class="item">

<span>Referral Bonus</span>

<span class="amount">
+$0.00
</span>

</div>


</div>



<div class="card">

<h3>Withdrawal History</h3>


<div class="item">

<span>PayPal Withdrawal</span>

<span class="withdraw">
No withdrawals yet
</span>

</div>


</div>



</div>


</body>

</html>
